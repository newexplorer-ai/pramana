# Pramana — Fly.io app config.
#
# ⚠ REGION IS SINGAPORE, NOT INDIA — REVISIT BEFORE REAL CLINICAL USE.
# The PRD (§7.9) calls for an India region under DPDP. Fly had no volume
# capacity in Mumbai (bom) at deploy time ("no capacity available in bom"),
# so this beta runs in Singapore (sin), the nearest available region.
# No patient-identifiable data is stored by design, but move to bom when
# capacity frees up:  flyctl volumes create pramana_data --region bom ...
app = "pramana"
primary_region = "sin"

[build]

[env]
  PRAMANA_DB = "/data/pramana.db"

# Persistent disk — SQLite would be lost on every deploy without this.
[[mounts]]
  source = "pramana_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

# Long-running: a Tier 2 answer can take 30s+ (search + generation + judge).
[http_service.http_options]
  idle_timeout = 120

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
