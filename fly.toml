# Pramana — Fly.io app config.
# Region: Mumbai (bom) to match the PRD's India data-residency intent (§7.9).
app = "pramana"
primary_region = "bom"

[build]

[env]
  PRAMANA_DB = "/data/pramana.db"

# Persistent disk — SQLite would be lost on every deploy without this.
[[mounts]]
  source = "pramana_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

# Long-running: a Tier 2 answer can take 30s+ (search + generation + judge).
[http_service.http_options]
  idle_timeout = 120

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
